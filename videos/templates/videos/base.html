<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}VideoStream{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #00f0ff;
            --secondary: #ff00ff;
            --dark: #0a0a0f;
            --darker: #050508;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            background: linear-gradient(135deg, var(--dark) 0%, var(--darker) 100%);
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 20%, rgba(0, 240, 255, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 0, 255, 0.15) 0%, transparent 50%);
            z-index: -1;
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        .navbar {
            background: rgba(5, 5, 8, 0.9) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .navbar:hover {
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.3);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 240, 255, 0.5);
            transition: all 0.3s ease;
        }

        .navbar-brand:hover {
            transform: scale(1.05);
            text-shadow: 0 0 40px rgba(0, 240, 255, 0.8);
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card:hover::before {
            opacity: 1;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 240, 255, 0.2);
            border-color: var(--primary);
        }

        .card-title {
            color: var(--primary);
            font-weight: 600;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }

        .btn {
            border-radius: 25px;
            padding: 10px 25px;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
            z-index: -1;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(0, 240, 255, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 240, 255, 0.6);
        }

        .btn-dark {
            background: rgba(20, 20, 30, 0.8);
            border: 1px solid var(--glass-border);
            color: var(--primary);
        }

        .btn-dark:hover {
            background: rgba(40, 40, 50, 0.9);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
        }

        .btn-outline-secondary {
            border: 1px solid var(--glass-border);
            color: var(--primary);
            background: transparent;
        }

        .btn-outline-secondary:hover {
            background: var(--glass);
            border-color: var(--primary);
            color: #ffffff;
        }

        .input-group {
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .form-control {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: #ffffff;
            padding: 12px 20px;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--primary);
            color: #ffffff;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .text-muted {
            color: rgba(255, 255, 255, 0.6) !important;
        }

        h1, h2, h3, h4, h5, h6 {
            font-weight: 700;
            letter-spacing: 1px;
        }

        .container {
            position: relative;
            z-index: 1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .float {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 20px rgba(0, 240, 255, 0.5); }
            50% { text-shadow: 0 0 30px rgba(0, 240, 255, 0.8), 0 0 40px rgba(255, 0, 255, 0.5); }
        }

        .glow {
            animation: glow 2s ease-in-out infinite;
        }

        .video-container {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        #videoPlayer {
            border-radius: 15px;
            background: #000;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.3);
        }

        .description-box {
            background: var(--glass);
            border-radius: 15px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .description-box:hover {
            box-shadow: 0 10px 30px rgba(0, 240, 255, 0.2);
            border-color: var(--primary);
        }

        @media (max-width: 768px) {
            .card {
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand glow" href="{% url 'home' %}">
                <i class="fas fa-play-circle me-2"></i>VideoStream
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'home' %}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'add_video' %}">Add Video</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <footer class="mt-5 py-4 text-center" style="border-top: 1px solid var(--glass-border); background: rgba(5, 5, 8, 0.9); backdrop-filter: blur(10px);">
        <p class="mb-0 text-muted">© 2026 VideoStream - Futuristic Video Platform</p>
        <p class="mb-0 mt-2 small">
            <i class="fas fa-microchip me-1"></i>Powered by Next-Gen Technology
        </p>
    </footer>
</body>
</html>

{% extends 'videos/base.html' %}
{% block title %}Add Video - VideoStream{% endblock %}
{% block content %}
<div class="row">
    <div class="col-lg-8 mx-auto">
        <div class="card p-4">
            <h1 class="mb-4 glow">
                <i class="fas fa-plus-circle me-3" style="color: var(--primary);"></i>Add New Video
            </h1>
            
            <div id="fetchStatus" class="alert d-none" style="background: var(--glass); border: 1px solid var(--glass-border); color: #ffffff;">
                <div class="d-flex align-items-center">
                    <div class="spinner me-3" style="border-color: var(--primary); border-top-color: transparent;"></div>
                    <span id="statusText">Fetching video info...</span>
                </div>
            </div>
            
            <form method="post" class="needs-validation" novalidate>
                {% csrf_token %}
                <div class="mb-4">
                    <label for="id_url" class="form-label text-muted">
                        <i class="fas fa-link me-2" style="color: var(--primary);"></i>Video URL
                    </label>
                    {{ form.url }}
                    <div class="form-text text-muted">Paste a YouTube or video URL to auto-fetch metadata</div>
                </div>
                
                <div class="mb-4">
                    <label for="id_title" class="form-label text-muted">
                        <i class="fas fa-heading me-2" style="color: var(--primary);"></i>Title
                    </label>
                    {{ form.title }}
                </div>
                
                <div class="mb-4">
                    <label for="id_description" class="form-label text-muted">
                        <i class="fas fa-align-left me-2" style="color: var(--primary);"></i>Description
                    </label>
                    {{ form.description }}
                </div>
                
                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-2"></i>Submit
                    </button>
                    <a href="{% url 'home' %}" class="btn btn-outline-secondary">
                        <i class="fas fa-times me-2"></i>Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const urlInput = document.querySelector('#id_url');
    const titleInput = document.querySelector('#id_title');
    const descInput = document.querySelector('#id_description');
    const statusDiv = document.getElementById('fetchStatus');
    var hideTimer = null;
    var fetchTimer = null;

    if (!urlInput || !titleInput) return;

    // Add futuristic styling to form inputs
    [urlInput, titleInput, descInput].forEach(input => {
        input.classList.add('form-control');
        input.style.background = 'var(--glass)';
        input.style.border = '1px solid var(--glass-border)';
        input.style.color = '#ffffff';
        input.addEventListener('focus', function() {
            this.style.borderColor = 'var(--primary)';
            this.style.boxShadow = '0 0 20px rgba(0, 240, 255, 0.3)';
        });
        input.addEventListener('blur', function() {
            this.style.borderColor = 'var(--glass-border)';
            this.style.boxShadow = 'none';
        });
    });

    urlInput.addEventListener('input', function () {
        if (fetchTimer) clearTimeout(fetchTimer);
        fetchTimer = setTimeout(fetchMetadata, 400);
    });

    function fetchMetadata() {
        if (hideTimer) clearTimeout(hideTimer);
        fetchTimer = null;
        const url = urlInput.value.trim();
        if (!url) {
            statusDiv.classList.add('d-none');
            return;
        }
        statusDiv.classList.remove('d-none');
        statusDiv.className = 'alert';
        statusDiv.style.background = 'var(--glass)';
        statusDiv.style.border = '1px solid var(--glass-border)';
        document.getElementById('statusText').textContent = 'Fetching video info...';

        fetch('{% url "fetch_video_metadata" %}?url=' + encodeURIComponent(url))
            .then(function (r) { return r.json(); })
            .then(function (data) {
                if (data.error) {
                    statusDiv.className = 'alert alert-warning';
                    statusDiv.textContent = 'Warning: ' + data.error;
                    return;
                }
                if (data.title) {
                    titleInput.value = data.title;
                }
                if (data.description && descInput) {
                    descInput.value = data.description;
                }
                statusDiv.className = 'alert alert-success';
                statusDiv.style.background = 'rgba(40, 167, 69, 0.2)';
                statusDiv.style.borderColor = '#28a745';
                statusDiv.textContent = '\u2713 Video info fetched successfully!';
                hideTimer = setTimeout(function () { statusDiv.classList.add('d-none'); }, 3000);
            })
            .catch(function () {
                statusDiv.className = 'alert alert-danger';
                statusDiv.style.background = 'rgba(220, 53, 69, 0.2)';
                statusDiv.style.borderColor = '#dc3545';
                statusDiv.textContent = 'Error fetching video info. Please fill manually.';
            });
    }
});
</script>
{% endblock %}
